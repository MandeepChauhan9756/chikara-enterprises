{% extends 'base.html' %}

{% block content %}

<style>
.reset-section{
    min-height:84vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eef2ff,#f8fafc,#e0f2fe);
    padding:20px;
}

.reset-card{
    width:100%;
    max-width:420px;
    border:none;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,.12);
    animation:fadeUp .7s ease;
}

.reset-header{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:#fff;
    text-align:center;
    padding:28px 20px;
}

.reset-header i{
    font-size:52px;
    margin-bottom:10px;
}

.reset-body{
    padding:32px;
}

.form-control{
    height:48px;
    border-radius:12px;
    border:1px solid #e5e7eb;
    transition:.3s;
}

.form-control:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

.btn-reset{
    width:100%;
    height:48px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:#fff;
    font-weight:600;
    transition:.3s;
}

.btn-reset:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(37,99,235,.25);
}

.bottom-text{
    text-align:center;
    margin-top:18px;
    font-size:14px;
}

.bottom-text a{
    font-weight:600;
    color:#2563eb;
    text-decoration:none;
}

.bottom-text a:hover{
    text-decoration:underline;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(25px);}
    to{opacity:1; transform:translateY(0);}
}
</style>

<section class="reset-section">

    <div class="card reset-card">

        <!-- HEADER -->
        <div class="reset-header">
            <i class="fa fa-lock"></i>
            <h3>Reset Password</h3>
            <p class="mb-0">Create a new secure password</p>
        </div>

        <!-- BODY -->
        <div class="reset-body">

            {% include 'includes/alerts.html' %}

            <form action="{% url 'resetPassword' %}" method="POST">
                {% csrf_token %}

                <div class="form-group mb-3">
                    <input type="password"
                           class="form-control"
                           placeholder="Create Password"
                           name="password"
                           required>
                </div>

                <div class="form-group mb-3">
                    <input type="password"
                           class="form-control"
                           placeholder="Confirm Password"
                           name="confirm_password"
                           required>
                </div>

                <button type="submit" class="btn-reset">
                    Reset Password
                </button>
            </form>

            <div class="bottom-text">
                Remember password?
                <a href="{% url 'login' %}">Login</a>
            </div>

        </div>
    </div>

</section>

{% endblock %}
